<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spending Calendar</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; transition: background 0.25s; }
    input[type=range] { -webkit-appearance: none; width: 100%; height: 3px; border-radius: 2px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    let RAW_DATA = [];
    let TODAY = "";

    const MONTH_NAMES     = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const DAY_NAMES_SHORT = ["S","M","T","W","T","F","S"];
    const DAY_NAMES       = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const DAY_NAMES_FULL  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

    // ─── Design tokens ───────────────────────────────────────────────────────────
    const THEMES = {
      light: {
        canvas:          "#f7f7f5",
        card:            "#ffffff",
        cardBorder:      "#ebebeb",
        text:            "#1a1a1f",
        textMuted:       "#6b6a72",
        textFaint:       "#b0afb8",
        navBg:           "#eeeeec",
        navActive:       "#F4623A",
        navActiveText:   "#ffffff",
        navInactiveText: "#6b6a72",
        todayRing:       "#F4623A",
        btnBg:           "#e8e8e4",
        btnIcon:         "#5a5960",
        chevron:         "#8a8a96",
        monthPrevNext:   "#c8c7d0",
        tiers: {
          none:   { bg: "transparent", text: "#b8b7c0", accent: "#dedde8", badge: "#ebebeb" },
          zero:   { bg: "#d6f0e2",     text: "#1a6844", accent: "#4dab78", badge: "#aee4c2" },
          low:    { bg: "#e2ede8",     text: "#2a5844", accent: "#6aaa88", badge: "#c0d8c8" },
          medium: { bg: "#fef4d8",     text: "#7a5010", accent: "#c48828", badge: "#f0dc8a" },
          high:   { bg: "#fcdcd4",     text: "#8a2c1e", accent: "#d4533f", badge: "#f2a89c" },
        },
      },
      dark: {
        canvas:          "#0f1115",
        card:            "#1c1f26",
        cardBorder:      "#2a2e37",
        text:            "#e8e8ec",
        textMuted:       "#8a8a96",
        textFaint:       "#3e404e",
        navBg:           "#1c1f26",
        navActive:       "#F4623A",
        navActiveText:   "#ffffff",
        navInactiveText: "#8a8a96",
        todayRing:       "#F4623A",
        btnBg:           "#252932",
        btnIcon:         "#8a8a96",
        chevron:         "#5a5a6a",
        monthPrevNext:   "#44444e",
        tiers: {
          none:   { bg: "transparent", text: "#42424e", accent: "#2a2e37", badge: "#1c1f26" },
          zero:   { bg: "#0a2818",     text: "#5ec880", accent: "#4dab78", badge: "#143020" },
          low:    { bg: "#0d2420",     text: "#50a870", accent: "#3d8060", badge: "#122a20" },
          medium: { bg: "#281e08",     text: "#c49840", accent: "#9a7028", badge: "#341f08" },
          high:   { bg: "#371208",     text: "#e0735f", accent: "#c0432c", badge: "#451609" },
        },
      },
    };

    // ─── SVG icons ────────────────────────────────────────────────────────────────
    // Proper Lucide "Settings" cog — outer gear teeth shape + center hole
    const GearIcon = ({size=18}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    );
    const SunIcon = ({size=16}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    );
    const MoonIcon = ({size=16}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    );
    const ChevLeft  = ({size=15}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    );
    const ChevRight = ({size=15}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    );
    const XIcon = ({size=12}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    );

    // ─── App ──────────────────────────────────────────────────────────────────────
    function SpendingCalendar() {
      const [view,         setView]         = useState("month");
      const [lowThreshold, setLowThreshold] = useState(75);
      const [highThreshold,setHighThreshold]= useState(300);
      const [selectedDay,  setSelectedDay]  = useState(null);
      const [showSettings, setShowSettings] = useState(false);
      const [currentMonth, setCurrentMonth] = useState(() => parseInt(TODAY.split("-")[1]) - 1);
      const [currentYear,  setCurrentYear]  = useState(() => parseInt(TODAY.split("-")[0]));
      const [weekOffset,   setWeekOffset]   = useState(0);
      const [mode,         setMode]         = useState(() => {
        try { const s = localStorage.getItem("scTheme"); if (s) return s; } catch {}
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      });

      const t = THEMES[mode];

      // Keep body bg in sync so overscroll areas match
      useEffect(() => { document.body.style.background = t.canvas; }, [mode]);

      const setThemeMode = (next) => {
        setMode(next);
        try { localStorage.setItem("scTheme", next); } catch {}
      };

      // Auto-select best day when entering week view or changing week
      useEffect(() => {
        if (view !== "week") { return; }
        const dates = getWeekDates(weekOffset);
        if (dates.includes(TODAY)) {
          setSelectedDay(TODAY);
        } else {
          const best = [...dates].reverse().find(ds => spendingMap[ds] || (ds >= MIN_DATE && ds <= TODAY));
          setSelectedDay(best || dates[dates.length - 1]);
        }
      }, [view, weekOffset]);

      const spendingMap = useMemo(() => {
        const map = {};
        RAW_DATA.forEach(d => { map[d.date] = d; });
        return map;
      }, []);

      const MIN_DATE = RAW_DATA.length ? RAW_DATA[0].date : TODAY;

      const getLevel = (total) => {
        if (total === undefined || total === null) return "none";
        if (total <= lowThreshold)  return "low";
        if (total <= highThreshold) return "medium";
        return "high";
      };

      // In-range days with no transactions = "zero" (green celebration)
      const getDateLevel = (ds) => {
        const dd = spendingMap[ds];
        if (dd) return getLevel(dd.total);
        if (ds >= MIN_DATE && ds <= TODAY) return "zero";
        return "none";
      };

      const numeral    = { fontVariantNumeric: "tabular-nums" };
      const formatDate = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const getDIM     = (y,m) => new Date(y,m+1,0).getDate();
      const getFDOM    = (y,m) => new Date(y,m,1).getDay();

      const prevMonth  = () => { if(currentMonth===0){setCurrentMonth(11);setCurrentYear(y=>y-1);}else setCurrentMonth(m=>m-1); };
      const nextMonth  = () => { if(currentMonth===11){setCurrentMonth(0);setCurrentYear(y=>y+1);}else setCurrentMonth(m=>m+1); };
      const toggleDay  = (ds) => setSelectedDay(prev => prev===ds ? null : ds);

      const getWeekDates = (offset) => {
        const base = new Date(TODAY + "T12:00:00");
        base.setDate(base.getDate() - base.getDay() + offset * 7);
        return Array.from({length:7}, (_,i) => {
          const d = new Date(base); d.setDate(base.getDate()+i);
          return d.toISOString().split("T")[0];
        });
      };

      const todayObj = new Date(TODAY + "T12:00:00");

      // Shared button shapes
      const iconBtn    = { background:t.btnBg, border:"none", borderRadius:"50%", width:38, height:38, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:t.btnIcon, flexShrink:0 };
      const chevronBtn = { background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", width:30, height:30, borderRadius:"50%", color:t.chevron };
      // Segmented control (theme toggle) colors
      const segTrack  = mode === "light" ? "#e6e6e2" : "#11141a";
      const segActive = mode === "light" ? "#ffffff" : "#2f343f";

      // ── DayDetail ──────────────────────────────────────────────────────────────
      function DayDetail() {
        if (!selectedDay) return null;
        const dd  = spendingMap[selectedDay];
        const lvl = getDateLevel(selectedDay);
        const s   = t.tiers[lvl];
        const isLow  = lvl === "low";
        const isZero = lvl === "zero";
        const [yr,mo,dy] = selectedDay.split("-");
        const label = `${MONTH_NAMES[parseInt(mo)-1]} ${parseInt(dy)}, ${yr}`;
        const panelBg  = lvl === "none" ? t.card : s.bg;
        const panelBdr = lvl === "none" ? t.cardBorder : s.badge;
        return (
          <div style={{background:panelBg,borderRadius:16,padding:18,marginTop:12,border:`1px solid ${panelBdr}`,boxShadow:"0 4px 18px rgba(0,0,0,0.08)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <div style={{fontWeight:500,fontSize:11,color:s.text,opacity:0.7,textTransform:"uppercase",letterSpacing:0.9,marginBottom:4}}>
                  {label}{isLow ? " · Low spend" : isZero ? " · No spend" : ""}
                </div>
                {dd
                  ? <div style={{fontWeight:800,fontSize:27,color:s.text,...numeral}}>${dd.total.toFixed(2)}</div>
                  : isZero
                    ? <div style={{fontWeight:700,fontSize:22,color:s.text,...numeral}}>$0 <span style={{fontSize:13,fontWeight:500,opacity:0.75}}>— nothing spent</span></div>
                    : <div style={{color:t.textMuted,fontSize:13,marginTop:4}}>No data for this day</div>
                }
              </div>
              <button onClick={()=>setSelectedDay(null)} style={{...iconBtn,width:28,height:28,background:"rgba(0,0,0,0.07)",color:s.text}}>
                <XIcon/>
              </button>
            </div>
            {dd?.transactions.map((tx,i) => (
              <div key={i} style={{background:"rgba(255,255,255,0.5)",borderRadius:10,padding:"10px 12px",marginBottom:5,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:500,fontSize:13,color:"#1a1a1f"}}>{tx.merchant}</div>
                  {tx.category && <div style={{fontSize:12,color:s.text,opacity:0.7,marginTop:2,fontWeight:500}}>{tx.category}</div>}
                </div>
                <div style={{fontWeight:600,fontSize:13,color:"#1a1a1f",...numeral}}>${tx.amount.toFixed(2)}</div>
              </div>
            ))}
            {isZero && <div style={{fontSize:13,color:s.text,fontWeight:500,padding:"6px 2px",opacity:0.85}}>No spending this day. 🌱</div>}
          </div>
        );
      }

      // ── Today view ────────────────────────────────────────────────────────────
      function TodayView() {
        const dd    = spendingMap[TODAY];
        const lvl   = getDateLevel(TODAY);
        const s     = t.tiers[lvl];
        const isLow  = lvl === "low";
        const isZero = lvl === "zero";
        const dnum  = String(todayObj.getDate()).padStart(2,"0");
        const mnum  = String(todayObj.getMonth()+1).padStart(2,"0");
        const total = dd ? dd.total : (isZero ? 0 : null);
        const statusLabel = isZero ? "No spend 💚" : isLow ? "Low spend 🏆" : lvl==="medium" ? "Moderate" : lvl==="high" ? "High spend" : "—";
        const heroBg  = lvl==="none" ? t.card : s.bg;
        const heroBdr = lvl==="none" ? t.cardBorder : s.badge;
        return (
          <div>
            <div style={{background:heroBg,borderRadius:24,padding:"24px 22px",marginBottom:12,border:`1px solid ${heroBdr}`}}>
              <div style={{color:s.text,fontWeight:500,fontSize:13,opacity:0.75,marginBottom:10,letterSpacing:0.1}}>{DAY_NAMES_FULL[todayObj.getDay()]}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:16}}>
                <div>
                  <div style={{color:s.text,fontSize:58,lineHeight:0.92,fontWeight:800,letterSpacing:"-0.04em",...numeral}}>{mnum}.{dnum}</div>
                  <div style={{color:s.text,fontSize:58,lineHeight:0.95,fontWeight:800,letterSpacing:"-0.04em"}}>{MONTH_NAMES[todayObj.getMonth()].slice(0,3).toUpperCase()}</div>
                </div>
                <div style={{borderLeft:`1.5px solid ${s.text}`,opacity:0.85,paddingLeft:18,minWidth:110,paddingTop:4}}>
                  {total !== null && <div style={{color:s.text,fontWeight:800,fontSize:28,...numeral}}>${total.toFixed(0)}</div>}
                  {total !== null && <div style={{color:s.text,fontSize:12,opacity:0.65,marginTop:2}}>spent today</div>}
                  <div style={{display:"inline-block",background:s.badge,borderRadius:100,padding:"5px 12px",marginTop:12,fontWeight:600,fontSize:12,color:s.text}}>{statusLabel}</div>
                </div>
              </div>
            </div>
            {dd?.transactions.map((tx,i) => (
              <div key={i} style={{background:t.card,borderRadius:12,padding:"12px 15px",marginBottom:7,display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${t.cardBorder}`}}>
                <div>
                  <div style={{fontWeight:500,fontSize:14,color:t.text}}>{tx.merchant}</div>
                  <div style={{fontSize:12,color:t.textMuted,marginTop:2}}>{tx.category}</div>
                </div>
                <div style={{fontWeight:600,fontSize:14,color:t.text,...numeral}}>${tx.amount.toFixed(2)}</div>
              </div>
            ))}
            {!dd && !isZero && <div style={{textAlign:"center",color:t.textFaint,padding:36,fontSize:14}}>No transaction data for today</div>}
          </div>
        );
      }

      // ── Week view ─────────────────────────────────────────────────────────────
      function WeekView() {
        const dates = getWeekDates(weekOffset);
        return (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <button onClick={()=>setWeekOffset(w=>w-1)} style={chevronBtn}><ChevLeft size={18}/></button>
              <span style={{fontWeight:500,fontSize:13,color:t.textMuted}}>
                {weekOffset===0 ? "This week" : weekOffset===-1 ? "Last week" : `${weekOffset>0?"+":""}${weekOffset} weeks`}
              </span>
              <button onClick={()=>setWeekOffset(w=>w+1)} style={chevronBtn}><ChevRight size={18}/></button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5}}>
              {dates.map((ds,i) => {
                const dd  = spendingMap[ds];
                const lvl = getDateLevel(ds);
                const s   = t.tiers[lvl];
                const isToday = ds === TODAY;
                const isSel   = selectedDay === ds;
                const isLow   = lvl === "low";
                const isZero  = lvl === "zero";
                const dayNum  = parseInt(ds.split("-")[2]);
                return (
                  <div key={ds} onClick={()=>toggleDay(ds)} style={{
                    background: lvl==="none" ? t.card : s.bg,
                    borderRadius:14,
                    padding:"10px 4px",
                    border: isSel || isToday ? `2px solid ${t.todayRing}` : `1px solid ${lvl==="none" ? t.cardBorder : s.badge}`,
                    cursor:"pointer",
                    textAlign:"center",
                    minHeight:86,
                  }}>
                    <div style={{fontSize:10,fontWeight:500,color:s.text,opacity:0.5,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>{DAY_NAMES[i]}</div>
                    <div style={{fontSize:19,fontWeight:isToday?700:500,color:isToday?t.todayRing:s.text,lineHeight:1,...numeral}}>{dayNum}</div>
                    {dd
                      ? <div style={{fontSize:10,fontWeight:600,color:s.text,marginTop:5,...numeral}}>${dd.total.toFixed(0)}</div>
                      : isZero
                        ? <div style={{fontSize:10,fontWeight:600,color:s.text,marginTop:5,...numeral}}>$0</div>
                        : <div style={{fontSize:10,color:s.text,opacity:0.25,marginTop:5}}>—</div>
                    }
                    {isLow  && <div style={{fontSize:11,marginTop:3}}>🏆</div>}
                    {isZero && <div style={{fontSize:11,marginTop:3}}>💚</div>}
                  </div>
                );
              })}
            </div>
            {selectedDay && <DayDetail/>}
          </div>
        );
      }

      // ── Month view ────────────────────────────────────────────────────────────
      function MonthView() {
        const dim = getDIM(currentYear, currentMonth);
        const fd  = getFDOM(currentYear, currentMonth);
        const cells = [];
        for(let i=0; i<fd; i++) cells.push(<div key={`e${i}`}/>);
        for(let d=1; d<=dim; d++) {
          const ds  = formatDate(currentYear, currentMonth, d);
          const dd  = spendingMap[ds];
          const lvl = getDateLevel(ds);
          const s   = t.tiers[lvl];
          const isToday = ds === TODAY;
          const isSel   = selectedDay === ds;
          const isLow   = lvl === "low";
          const isZero  = lvl === "zero";
          cells.push(
            <div key={d} onClick={()=>toggleDay(ds)} style={{
              background: lvl==="none" ? "transparent" : s.bg,
              borderRadius:10,
              padding:"6px 5px",
              border: isSel || isToday ? `2px solid ${t.todayRing}` : lvl==="none" ? `1px solid ${t.cardBorder}` : `1px solid ${s.badge}`,
              cursor:"pointer",
              minHeight:52,
              position:"relative",
            }}>
              <div style={{fontSize:12,fontWeight:isToday?700:400,color:isToday?t.todayRing:(lvl==="none"?t.textFaint:s.text),...numeral}}>{d}</div>
              {dd    && <div style={{fontSize:9,fontWeight:600,color:s.text,marginTop:2,...numeral}}>${dd.total>=1000?(dd.total/1000).toFixed(1)+"k":dd.total.toFixed(0)}</div>}
              {isZero && <div style={{fontSize:9,fontWeight:600,color:s.text,marginTop:2,...numeral}}>$0</div>}
              {isLow  && <div style={{fontSize:10,position:"absolute",bottom:2,right:3}}>🏆</div>}
              {isZero && <div style={{fontSize:10,position:"absolute",bottom:2,right:3}}>💚</div>}
            </div>
          );
        }
        return (
          <div style={{background:t.card,borderRadius:18,padding:14,border:`1px solid ${t.cardBorder}`}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
              {DAY_NAMES_SHORT.map((d,i) => (
                <div key={i} style={{textAlign:"center",fontSize:10,fontWeight:500,color:t.textFaint,padding:"2px 0"}}>{d}</div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>{cells}</div>
            {selectedDay && <DayDetail/>}
          </div>
        );
      }

      // ── Year view ─────────────────────────────────────────────────────────────
      function YearView() {
        return (
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {MONTH_NAMES.map((mName,mi) => {
              const dim = getDIM(currentYear, mi);
              const fd  = getFDOM(currentYear, mi);
              let tot=0, has=false;
              for(let d=1; d<=dim; d++) {
                const ds = formatDate(currentYear, mi, d);
                if (spendingMap[ds]) { tot += spendingMap[ds].total; has = true; }
              }
              const avgDaily = has ? tot/dim : 0;
              const mLvl = !has ? "none" : avgDaily<=lowThreshold ? "low" : avgDaily<=highThreshold ? "medium" : "high";
              const ms = t.tiers[mLvl];
              return (
                <div key={mi} onClick={()=>{ setCurrentMonth(mi); setView("month"); }} style={{background:mLvl==="none"?t.card:ms.bg,borderRadius:12,padding:"10px 8px",border:`1px solid ${mLvl==="none"?t.cardBorder:ms.badge}`,cursor:"pointer",transition:"opacity 0.12s"}}
                  onMouseEnter={e=>e.currentTarget.style.opacity="0.8"}
                  onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
                  <div style={{fontWeight:600,fontSize:10,color:mLvl==="none"?t.textMuted:ms.text,marginBottom:6,letterSpacing:0.5}}>{mName.slice(0,3).toUpperCase()}</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
                    {Array(fd).fill(null).map((_,i) => <div key={`ep${i}`}/>)}
                    {Array(dim).fill(null).map((_,i) => {
                      const d  = i+1;
                      const ds = formatDate(currentYear, mi, d);
                      const lvl= getDateLevel(ds);
                      const s2 = t.tiers[lvl];
                      return (
                        <div key={d} style={{
                          width:6, height:6, borderRadius:"50%",
                          background: lvl==="none" ? t.cardBorder : s2.accent,
                          border: ds===TODAY ? `1.5px solid ${t.todayRing}` : "none",
                        }}/>
                      );
                    })}
                  </div>
                  {has && <div style={{fontSize:10,fontWeight:600,color:ms.text,marginTop:6,...numeral}}>${tot.toFixed(0)}</div>}
                </div>
              );
            })}
          </div>
        );
      }

      // ── Shell ─────────────────────────────────────────────────────────────────
      return (
        <div style={{maxWidth:520,margin:"0 auto",fontFamily:"'Inter',system-ui,sans-serif",background:t.canvas,minHeight:"100vh",padding:"20px 14px 48px",transition:"background 0.25s"}}>

          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            {/* Nav tabs */}
            <div style={{display:"flex",background:t.navBg,borderRadius:100,padding:3,gap:2}}>
              {["Today","Week","Month","Year"].map(v => (
                <button key={v} onClick={()=>setView(v.toLowerCase())} style={{
                  background: view===v.toLowerCase() ? t.navActive : "transparent",
                  color:      view===v.toLowerCase() ? t.navActiveText : t.navInactiveText,
                  border:"none",
                  borderRadius:100,
                  padding:"8px 14px",
                  fontWeight: view===v.toLowerCase() ? 600 : 500,
                  fontSize:13,
                  cursor:"pointer",
                  fontFamily:"inherit",
                  transition:"background 0.15s,color 0.15s",
                }}>{v}</button>
              ))}
            </div>
            {/* Settings (single button + anchored popover) */}
            <div style={{position:"relative"}}>
              <button onClick={()=>setShowSettings(s=>!s)} title="Settings" style={{
                ...iconBtn,
                background: showSettings ? t.navActive : t.btnBg,
                color:      showSettings ? "#ffffff"   : t.btnIcon,
                transition:"background 0.15s,color 0.15s",
              }}>
                <GearIcon/>
              </button>

              {showSettings && (
                <React.Fragment>
                  {/* click-outside backdrop */}
                  <div onClick={()=>setShowSettings(false)} style={{position:"fixed",inset:0,zIndex:40}}/>
                  {/* popover */}
                  <div style={{
                    position:"absolute", top:46, right:0, width:288, zIndex:50,
                    background:t.card, borderRadius:16, padding:16,
                    border:`1px solid ${t.cardBorder}`,
                    boxShadow:"0 12px 36px rgba(0,0,0,0.18)",
                  }}>
                    {/* Appearance */}
                    <div style={{fontSize:11,fontWeight:600,color:t.textMuted,textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>Appearance</div>
                    <div style={{display:"flex",background:segTrack,borderRadius:100,padding:3,gap:3,marginBottom:18}}>
                      {[{m:"light",label:"Light",icon:<SunIcon size={13}/>},{m:"dark",label:"Dark",icon:<MoonIcon size={13}/>}].map(({m,label,icon}) => (
                        <button key={m} onClick={()=>setThemeMode(m)} style={{
                          flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6,
                          background: mode===m ? segActive : "transparent",
                          color:      mode===m ? t.text : t.textMuted,
                          border:"none", borderRadius:100, padding:"7px 10px",
                          fontWeight:500, fontSize:12, cursor:"pointer", fontFamily:"inherit",
                          boxShadow: mode===m ? "0 1px 3px rgba(0,0,0,0.16)" : "none",
                          transition:"background 0.15s,color 0.15s",
                        }}>{icon}{label}</button>
                      ))}
                    </div>

                    {/* Thresholds */}
                    <div style={{fontSize:11,fontWeight:600,color:t.textMuted,textTransform:"uppercase",letterSpacing:0.8,marginBottom:10}}>Spending thresholds</div>
                    <div style={{marginBottom:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                        <label style={{fontSize:12,fontWeight:500,color:t.tiers.low.text}}>🏆 Low spending</label>
                        <span style={{fontWeight:600,fontSize:12,color:t.text,...numeral}}>under ${lowThreshold}</span>
                      </div>
                      <input type="range" min={0} max={500} step={5} value={lowThreshold}
                        onChange={e=>setLowThreshold(Number(e.target.value))}
                        style={{accentColor:t.tiers.low.accent}}/>
                    </div>
                    <div style={{marginBottom:16}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                        <label style={{fontSize:12,fontWeight:500,color:t.tiers.high.text}}>High spending</label>
                        <span style={{fontWeight:600,fontSize:12,color:t.text,...numeral}}>over ${highThreshold}</span>
                      </div>
                      <input type="range" min={0} max={3000} step={25} value={highThreshold}
                        onChange={e=>setHighThreshold(Number(e.target.value))}
                        style={{accentColor:t.tiers.high.accent}}/>
                    </div>

                    {/* Tier legend */}
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {[
                        {label:"💚 $0 day", tier:"zero"},
                        {label:"🏆 Low",    tier:"low"},
                        {label:"Medium",    tier:"medium"},
                        {label:"High",      tier:"high"},
                        {label:"No data",   tier:"none"},
                      ].map(({label,tier}) => {
                        const s = t.tiers[tier];
                        return (
                          <div key={tier} style={{
                            background: tier==="none" ? t.navBg : s.bg,
                            color:      tier==="none" ? t.textMuted : s.text,
                            border:`1px solid ${tier==="none" ? t.cardBorder : s.badge}`,
                            borderRadius:100, padding:"4px 10px", fontSize:11, fontWeight:500,
                          }}>{label}</div>
                        );
                      })}
                    </div>
                  </div>
                </React.Fragment>
              )}
            </div>
          </div>

          {/* Month switcher */}
          {(view==="month" || view==="year") && (
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginBottom:12,padding:"8px 4px",background:t.card,borderRadius:100,border:`1px solid ${t.cardBorder}`}}>
              <span style={{fontWeight:500,fontSize:12,color:t.monthPrevNext,letterSpacing:0.3,minWidth:32,textAlign:"right"}}>{MONTH_NAMES[(currentMonth+11)%12].slice(0,3)}</span>
              <button onClick={prevMonth} style={chevronBtn}><ChevLeft/></button>
              <span style={{fontSize:15,fontWeight:700,color:t.text,letterSpacing:0.3,minWidth:46,textAlign:"center"}}>{MONTH_NAMES[currentMonth].slice(0,3).toUpperCase()}</span>
              <button onClick={nextMonth} style={chevronBtn}><ChevRight/></button>
              <span style={{fontWeight:500,fontSize:12,color:t.monthPrevNext,letterSpacing:0.3,minWidth:32}}>{MONTH_NAMES[(currentMonth+1)%12].slice(0,3)}</span>
            </div>
          )}

          {view==="today" && <TodayView/>}
          {view==="week"  && <WeekView/>}
          {view==="month" && <MonthView/>}
          {view==="year"  && <YearView/>}
        </div>
      );
    }

    // ─── Bootstrap ────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <div style={{fontFamily:"Inter,system-ui,sans-serif",padding:40,color:"#8a8a96",background:"#f7f7f5",minHeight:"100vh"}}>
        Loading…
      </div>
    );
    fetch("data/spending.json", { cache: "no-store" })
      .then(r => { if (!r.ok) throw new Error("fetch failed"); return r.json(); })
      .then(j => {
        RAW_DATA = j.data || [];
        TODAY    = j.today || (RAW_DATA.length ? RAW_DATA[RAW_DATA.length-1].date : new Date().toISOString().slice(0,10));
        root.render(<SpendingCalendar/>);
      })
      .catch(err => {
        root.render(
          <div style={{fontFamily:"Inter,system-ui,sans-serif",padding:40,color:"#9f2f23",background:"#f7f7f5",minHeight:"100vh"}}>
            Couldn't load spending data ({String(err.message)}). Check that data/spending.json exists.
          </div>
        );
      });
  </script>
</body>
</html>
