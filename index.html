<!DOCTYPE html>

  <meta charset="UTF-8" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%236c5cf6'/%3E%3Ctext x='50' y='74' font-family='Georgia,serif' font-size='62' font-weight='700' text-anchor='middle' fill='white'%3E$%3C/text%3E%3C/svg%3E" />
  <!-- Pinned production builds + Subresource Integrity. No build step; resilient to CDN drift. -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"
          integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"

          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"
          integrity="sha384-x/ilTFv/u/eu6YSmkFDZl5V5Mm/pkxxcVv2cVJOrr1J0rvILhMvRBCy6yA75wYBj"

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    let RAW_DATA = [];
    let TODAY = "";
    let GENERATED_AT = "";
    let REFRESH_STATUS = "";

    const MONTH_NAMES     = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const DAY_NAMES_SHORT = ["S","M","T","W","T","F","S"];
    const DAY_NAMES       = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const DAY_NAMES_FULL  = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

    // ─── Design tokens · "The Daily Spend" ───────────────────────────────────────
    // Theme-agnostic tokens (typefaces). Periwinkle is the single accent; spend is
    // the only loud color; everything sits on warm newsprint (light) or charcoal
    // newsprint (Night Edition).
    const TOKENS = {
      type: {
        display: "'Anton', sans-serif",      // masthead nameplate only
        serif:   "'Fraunces', serif",         // all numerals (italic when large)
        chic:    "'Syne', sans-serif",         // labels, kickers, section heads
        ui:      "'Inter', system-ui, sans-serif",
      },
    };

    const THEMES = {
      light: {
        // print tokens
        paper:  "#efe9da", ink: "#16131c", inkMuted: "#6a6676",
        accent: "#6c5cf6", accentTint: "#e7e3ff",
        accent2: "#cdee2a", accent2Ink: "#3a4500",   // acid-lime fill + dark ink (good / met goal)
        over: "#bf3b2e", overTint: "#f4ddd5",         // rust-red (overspent)
        credit: "#0a7268",                            // teal "money in" (income, refunds) — contrast 4.79 on paper
        goodTint: "#ebf3c4",                          // pale lime wash (good days)
        neutralTint: "#e6ddc9",                       // faint warm wash (on-pace days) — distinct from empty
        ruleHair: "#cfc7b4", ruleBold: "#16131c",
        grain: "radial-gradient(rgba(0,0,0,.025) 1px, transparent 1px)",
        // legacy keys (still referenced by views until each is reskinned)
        canvas:          "#efe9da",
        card:            "#f6f1e6",
        cardBorder:      "#cfc7b4",
        text:            "#16131c",
        textMuted:       "#6a6676",
        textFaint:       "#b8b09a",
        navBg:           "#e3ddcd",
        navActive:       "#6c5cf6",
        navActiveText:   "#ffffff",
        navInactiveText: "#6a6676",
        todayRing:       "#6c5cf6",
        btnBg:           "#e3ddcd",
        btnIcon:         "#4a4654",
        chevron:         "#8a8676",
        monthPrevNext:   "#b8b09a",
        tiers: {
          none:   { bg: "transparent", text: "#b8b09a", accent: "#d8cdb8", badge: "#e2d8c4" },
          zero:   { bg: "#e7e9dd",     text: "#5f7250", accent: "#8aa07a", badge: "#d2dcc4" },
          low:    { bg: "#efe7d6",     text: "#7a6a48", accent: "#b9a06a", badge: "#ddd0b0" },
          medium: { bg: "#efe3d0",     text: "#9a6a30", accent: "#c89a55", badge: "#e6d4b8" },
          high:   { bg: "#e7e3ff",     text: "#6c5cf6", accent: "#6c5cf6", badge: "#cfc7f8" },
        },
      },
      dark: {
        paper:  "#14121a", ink: "#ece8f4", inkMuted: "#9a93a8",
        accent: "#7b6cff", accentTint: "#221d3a",
        accent2: "#c2e000", accent2Ink: "#1a2000",   // acid-lime fill + dark ink (good / met goal)
        over: "#e0654f", overTint: "#3a1a12",         // rust-red (overspent)
        credit: "#3fd9c4",                            // teal "money in" (income, refunds) — contrast 10.5 on paper
        goodTint: "#34431a",                          // lime wash (good days) — lifted for Night-edition legibility
        neutralTint: "#262430",                       // faint wash (on-pace days) — distinct from empty canvas
        ruleHair: "#2e2a3a", ruleBold: "#5a5470",
        grain: "radial-gradient(rgba(255,255,255,.022) 1px, transparent 1px)",
        canvas:          "#14121a",
        card:            "#1c1925",
        cardBorder:      "#2e2a3a",
        text:            "#ece8f4",
        textMuted:       "#9a93a8",
        textFaint:       "#4a4458",
        navBg:           "#1c1925",
        navActive:       "#7b6cff",
        navActiveText:   "#ffffff",
        navInactiveText: "#9a93a8",
        todayRing:       "#7b6cff",
        btnBg:           "#26222f",
        btnIcon:         "#9a93a8",
        chevron:         "#6a6478",
        monthPrevNext:   "#4a4458",
        tiers: {
          none:   { bg: "transparent", text: "#4a4458", accent: "#2e2a3a", badge: "#1c1925" },
          zero:   { bg: "#1a2018",     text: "#7a9a68", accent: "#4a6040", badge: "#243018" },
          low:    { bg: "#201d16",     text: "#b0a070", accent: "#6a5d3a", badge: "#2a2510" },
          medium: { bg: "#241d12",     text: "#c89a55", accent: "#8a6a30", badge: "#2e2208" },
          high:   { bg: "#221d3a",     text: "#9a8cff", accent: "#7b6cff", badge: "#332a55" },
        },
      },
    };

    // ─── SVG icons ────────────────────────────────────────────────────────────────
    // Proper Lucide "Settings" cog — outer gear teeth shape + center hole
    const GearIcon = ({size=18}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    );
    const SunIcon = ({size=16}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    );
    const MoonIcon = ({size=16}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    );
    const ChevLeft  = ({size=15}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    );
    const ChevRight = ({size=15}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    );
    const XIcon = ({size=12}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    );

    // ─── App ──────────────────────────────────────────────────────────────────────
    function SpendingCalendar() {
      const [view,         setView]         = useState("month");
      const [lowThreshold, setLowThreshold] = useState(75);
      const [highThreshold,setHighThreshold]= useState(300);
      const [selectedDay,  setSelectedDay]  = useState(null);
      const [showSettings, setShowSettings] = useState(false);
      const [currentMonth, setCurrentMonth] = useState(() => parseInt(TODAY.split("-")[1]) - 1);
      const [currentYear,  setCurrentYear]  = useState(() => parseInt(TODAY.split("-")[0]));
      const [weekOffset,   setWeekOffset]   = useState(0);
      const [staleDismissed, setStaleDismissed] = useState(false);
      const [activeCats,   setActiveCats]   = useState([]); // [] = all categories
      const [mode,         setMode]         = useState(() => {
        try { const s = localStorage.getItem("scTheme"); if (s) return s; } catch {}
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      });
      // Verdict basis: "spend" (default — verdict reads gross spend) or "net"
      // (verdict reads net outflow = spend − money in).
      const [verdictBasis, setVerdictBasis] = useState(() => {
        try { const s = localStorage.getItem("scVerdictBasis"); if (s === "net" || s === "spend") return s; } catch {}
        return "spend";
      });
      const netMode = verdictBasis === "net";
      const setBasis = (next) => {
        setVerdictBasis(next);
        try { localStorage.setItem("scVerdictBasis", next); } catch {}
      };

      const t = THEMES[mode];

      // Keep body bg in sync so overscroll areas match
      useEffect(() => { document.body.style.background = t.canvas; }, [mode]);

      // Esc closes the settings popover
      useEffect(() => {
        if (!showSettings) return;
        const onKey = (e) => { if (e.key === "Escape") setShowSettings(false); };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [showSettings]);

      const setThemeMode = (next) => {
        setMode(next);
        try { localStorage.setItem("scTheme", next); } catch {}
      };

      // Auto-select best day when entering week view or changing week
      useEffect(() => {
        if (view !== "week") { return; }
        const dates = getWeekDates(weekOffset);
        if (dates.includes(TODAY)) {
          setSelectedDay(TODAY);
        } else {
          const best = [...dates].reverse().find(ds => spendingMap[ds] || (ds >= MIN_DATE && ds <= TODAY));
          setSelectedDay(best || dates[dates.length - 1]);
        }
      }, [view, weekOffset]);

      // Close an open day's detail when navigating to a different month/year —
      // otherwise the DayDetail card describes a day no longer in the grid.
      useEffect(() => { setSelectedDay(null); }, [currentMonth, currentYear]);

      const spendingMap = useMemo(() => {
        const map = {};
        RAW_DATA.forEach(d => { map[d.date] = d; });
        return map;
      }, []);

      const MIN_DATE = RAW_DATA.length ? RAW_DATA[0].date : TODAY;

      // Direction of a transaction (Option A: positive amount + explicit type).
      // Old data without `type` is treated as debit (spend) — backward compatible.
      const isCredit = (tx) => tx.type === "credit";

      // Categories present in the data, split by direction and ordered by size
      // (biggest first). Splitting keeps credit categories (Income, refunds) from
      // distorting the spend ordering. FilterBar renders debit chips today; credit
      // chips arrive in a later slice.
      const { debitCategories, creditCategories } = useMemo(() => {
        const dSums = {}, cSums = {};
        RAW_DATA.forEach(d => d.transactions.forEach(tx => {
          if (!tx.category) return;
          const bucket = isCredit(tx) ? cSums : dSums;
          bucket[tx.category] = (bucket[tx.category] || 0) + tx.amount;
        }));
        const sortDesc = (o) => Object.entries(o).sort((a,b) => b[1]-a[1]).map(([c]) => c);
        // Credit chips list only credit-ONLY categories (income types). A category
        // that also has debits (e.g. a refund in "Groceries") is already reachable
        // via its debit chip — filtering is by category name, so a separate credit
        // chip would be a redundant duplicate that returns the identical set.
        return { debitCategories: sortDesc(dSums), creditCategories: sortDesc(cSums).filter(c => !(c in dSums)) };
      }, []);
      const categories = debitCategories;

      // ── Filtered "Focus mode" ──────────────────────────────────────────────────
      // When categories are selected the view stops asking "how was my day overall?"
      // and starts asking "how much went to THIS, and on which days?". Two things
      // change: (1) verdict tiers re-scope to the filtered slice's own scale, and
      // (2) days with no spend in the slice recede (the "absent" level) so the days
      // that DID spend stand out — while every day stays on the grid.
      const isFiltered  = activeCats.length > 0;
      const filterLabel = activeCats.length === 1 ? activeCats[0]
        : activeCats.length > 1 ? `${activeCats.length} categories` : null;

      // Per-slice thresholds derived from the filtered category's own distribution:
      // low/high sit at 0.6×/1.4× the mean spend across days the slice appears on,
      // so ✓ / – / ▲ mean "light / typical / heavy <category> day for you". Falls
      // back to the global thresholds when nothing's filtered or the slice is empty.
      const filteredThresholds = useMemo(() => {
        if (!activeCats.length) return null;
        let sum = 0, days = 0;
        RAW_DATA.forEach(d => {
          const tot = d.transactions.reduce((s,tx) =>
            (!isCredit(tx) && activeCats.includes(tx.category)) ? s + tx.amount : s, 0);
          if (tot > 0) { sum += tot; days++; }
        });
        if (days === 0) return null;
        const avg = sum / days;
        return { low: avg * 0.6, high: avg * 1.4, avg };
      }, [activeCats]);

      // Sum a transaction list into spend / received / net. `total` is gross spend
      // (debits only) so the verdict + heatmap keep their meaning; credits are
      // tracked separately as `received`, with `net = received - total`.
      const sumTxns = (txns) => {
        let total = 0, received = 0;
        txns.forEach(tx => { if (isCredit(tx)) received += tx.amount; else total += tx.amount; });
        total    = Math.round(total    * 100) / 100;
        received = Math.round(received * 100) / 100;
        return { total, received, net: Math.round((received - total) * 100) / 100 };
      };

      // Apply the active category filter to a day record, recomputing the figures.
      // Empty filter = all transactions. Returns null for a missing day, else a
      // {date, total, received, net, transactions} view of it.
      const viewDay = (dd) => {
        if (!dd) return null;
        const txns = activeCats.length
          ? dd.transactions.filter(tx => activeCats.includes(tx.category))
          : dd.transactions;
        return { ...dd, transactions: txns, ...sumTxns(txns) };
      };

      const getLevel = (total) => {
        if (total === undefined || total === null) return "none";
        // Filtered → judge against the slice's own scale; else the global budget.
        const lo = filteredThresholds ? filteredThresholds.low  : lowThreshold;
        const hiT= filteredThresholds ? filteredThresholds.high : highThreshold;
        // Clamp so an inverted config (low > high) can't mis-classify.
        const hi = Math.max(hiT, lo);
        if (total <= lo)  return "low";
        if (total <= hi)  return "medium";
        return "high";
      };

      // Tier a day. In spend mode the metric is gross spend; in net mode it's
      // net outflow (spend − money in), with a "gain" tier for net-inflow days.
      // In-range days with no activity = "zero".
      const getDateLevel = (ds) => {
        const raw = spendingMap[ds];
        const dd = viewDay(raw);
        const inRange = ds >= MIN_DATE && ds <= TODAY;

        // Focus mode: only days with category SPEND earn a verdict fill. Every
        // zero-spend day — empty, out-of-category, or refund-only — recedes as
        // "absent" so the filtered view answers "which days did I spend on this?".
        // (Refund-only days keep their faint "+" marker via the per-cell badge.)
        if (isFiltered) {
          if (!dd || dd.total === 0) return (!raw && !inRange) ? "none" : "absent";
          if (netMode) {
            const outflow = Math.round((dd.total - dd.received) * 100) / 100;
            if (dd.received > 0 && outflow <= 0) return "gain";
            return getLevel(outflow);
          }
          return getLevel(dd.total);
        }

        if (!dd) return inRange ? "zero" : "none";
        if (netMode) {
          // Empty day → zero (NOT a "gain"); pure-income day → gain (not "No spend").
          if (dd.total === 0 && dd.received === 0) return inRange ? "zero" : "none";
          const outflow = Math.round((dd.total - dd.received) * 100) / 100;
          if (dd.received > 0 && outflow <= 0) return "gain";   // took in at least as much as spent
          return getLevel(outflow);                             // net outflow tiered by the same thresholds
        }
        if (dd.total === 0) return inRange ? "zero" : "none";
        return getLevel(dd.total);
      };

      // Verdict: maps a tier to a clear good / on-pace / over signal. `mark` is a
      // shape-first glyph so the grid reads without relying on color (also
      // colorblind-safe): ▲ over · – on pace · ✓ met goal · ● no spend · ✦ net+.
      const verdictOf = (lvl) =>
        lvl === "high"   ? { tone: "over",    label: "Overspent",      mark: "▲" } :
        lvl === "absent" ? { tone: "neutral", label: filterLabel ? `No ${filterLabel}` : "None", mark: "·" } :
        lvl === "gain"   ? { tone: "good",    label: "Net positive ✦", mark: "✦" } :
        lvl === "zero"   ? { tone: "good",    label: "No spend ●",     mark: "●" } :
        lvl === "low"    ? { tone: "good",    label: "Met goal ✓",     mark: "✓" } :
        lvl === "medium" ? { tone: "neutral", label: "On pace",        mark: "–" } : null;

      // Cell fill + text by verdict — the at-a-glance heatmap encoding. The glyph
      // (verdictOf.mark) is the primary signal; fill reinforces it. "On pace" gets
      // a faint tint so it's distinct from an empty (no-data) cell.
      const cellTone = (lvl) =>
        lvl === "high"                                       ? { bg: t.over,        num: "#fff",      amt: "#fff"      } :
        (lvl === "low" || lvl === "zero" || lvl === "gain")  ? { bg: t.goodTint,    num: t.inkMuted,  amt: t.ink       } :
        lvl === "medium"                                     ? { bg: t.neutralTint, num: t.inkMuted,  amt: t.ink       } :
        lvl === "absent"                                     ? { bg: "transparent", num: t.textFaint, amt: t.textFaint } :
                                                               { bg: "transparent",  num: t.inkMuted, amt: t.ink  };

      const numeral    = { fontVariantNumeric: "tabular-nums" };

      // Money-in always reads +$ in teal.
      const fmtMoney   = (n) => `$${Math.abs(n).toFixed(0)}`;
      const creditAmt  = (n) => `+$${Math.abs(n).toFixed(2)}`;

      // Net presented as "net spent" (spend − money in): a net outflow reads as a
      // plain positive $ (it's still spending), a net inflow reads +$ teal (the
      // day came out ahead). `decimals`: 0 compact, 2 for the receipt.
      const netSpentParts = (dd, decimals = 0) => {
        const ns = Math.round((dd.total - dd.received) * 100) / 100;
        return ns < 0
          ? { text: `+$${Math.abs(ns).toFixed(decimals)}`, color: t.credit }
          : { text: `$${ns.toFixed(decimals)}`,            color: t.ink    };
      };

      // The day's headline figure under the current basis: gross spend (Spend
      // mode) or net cost = spend − money in (Net mode; negative = netted money in).
      const basisAmount = (dd) => netMode ? Math.round((dd.total - dd.received) * 100) / 100 : dd.total;

      // Format a basis amount. A net gain (negative — only possible in Net mode)
      // reads +$ teal; otherwise a plain $. `abbrev` shortens ≥1000 to "1.1k".
      const fmtAmt = (v, decimals = 0, abbrev = false) => {
        const gain = v < 0;
        const a = Math.abs(v);
        const body = (abbrev && a >= 1000) ? (a / 1000).toFixed(1) + "k" : a.toFixed(decimals);
        return { text: (gain ? "+$" : "$") + body, gain };
      };

      const formatDate = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const getDIM     = (y,m) => new Date(y,m+1,0).getDate();
      const getFDOM    = (y,m) => new Date(y,m,1).getDay();

      const prevMonth  = () => { if(currentMonth===0){setCurrentMonth(11);setCurrentYear(y=>y-1);}else setCurrentMonth(m=>m-1); };
      const nextMonth  = () => { if(currentMonth===11){setCurrentMonth(0);setCurrentYear(y=>y+1);}else setCurrentMonth(m=>m+1); };
      const toggleDay  = (ds) => setSelectedDay(prev => prev===ds ? null : ds);

      const getWeekDates = (offset) => {
        const base = new Date(TODAY + "T12:00:00");
        base.setDate(base.getDate() - base.getDay() + offset * 7);
        return Array.from({length:7}, (_,i) => {
          const d = new Date(base); d.setDate(base.getDate()+i);
          return d.toISOString().split("T")[0];
        });
      };

      const todayObj = new Date(TODAY + "T12:00:00");

      // Shared button shapes
      const iconBtn    = { background:t.btnBg, border:"none", borderRadius:"50%", width:38, height:38, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:t.btnIcon, flexShrink:0 };
      const chevronBtn = { background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", width:30, height:30, borderRadius:"50%", color:t.chevron };
      // Segmented control (theme toggle) colors
      const segTrack  = mode === "light" ? "#e6e6e2" : "#11141a";
      const segActive = mode === "light" ? "#ffffff" : "#2f343f";

      // ── Receipt = a ledger that separates spending from money-in ────────────────
      // On a debit-only day it's a clean flat list (unchanged). When a day has
      // credits too, it splits into a "Spending" section + subtotal and a
      // "Money in" section + subtotal, closed by a Net line — like a receipt.
      function Receipt({ dd, merchantSize = 13, amountSize = 15, showNet = true }) {
        const debits  = dd.transactions.filter(tx => !isCredit(tx));
        const credits = dd.transactions.filter(isCredit);
        const row = (tx, i, credit) => (
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${t.ruleHair}`}}>
            <div>
              <div style={{fontWeight:credit?400:500,fontSize:merchantSize,color:t.ink}}>{tx.merchant}</div>
              {tx.category && <div style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:12,color:t.inkMuted,marginTop:1}}>{tx.category}</div>}
            </div>
            <div style={{fontFamily:TOKENS.type.serif,fontSize:amountSize,fontWeight:credit?400:undefined,color:credit?t.credit:t.ink,...numeral}}>{credit?creditAmt(tx.amount):`$${tx.amount.toFixed(2)}`}</div>
          </div>
        );
        // No credits → the familiar flat spending list.
        if (dd.received === 0) return <React.Fragment>{debits.map((tx,i) => row(tx,i,false))}</React.Fragment>;
        const kicker = (label, color) => (
          <div style={{fontFamily:TOKENS.type.chic,fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color,margin:"15px 0 1px"}}>{label}</div>
        );
        const subtotal = (label, value, color) => (
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"8px 0 2px",borderTop:`2px solid ${t.ruleBold}`,marginTop:1}}>
            <span style={{fontFamily:TOKENS.type.chic,fontSize:11,letterSpacing:"0.06em",textTransform:"uppercase",color:t.inkMuted}}>{label}</span>
            <span style={{fontFamily:TOKENS.type.serif,fontSize:16,color,...numeral}}>{value}</span>
          </div>
        );
        return (
          <React.Fragment>
            {kicker("Spending", t.inkMuted)}
            {debits.length ? debits.map((tx,i) => row(tx,i,false))
              : <div style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:13,color:t.inkMuted,padding:"10px 0"}}>Nothing spent. ●</div>}
            {subtotal("Total spent", `$${dd.total.toFixed(2)}`, t.ink)}
            {kicker("Money in", t.credit)}
            {credits.map((tx,i) => row(tx,i,true))}
            {subtotal("Total received", creditAmt(dd.received), t.credit)}
            {showNet && (
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"10px 0 2px",borderTop:`3px double ${t.ruleBold}`,marginTop:6}}>
                <span style={{fontFamily:TOKENS.type.chic,fontSize:12,letterSpacing:"0.08em",textTransform:"uppercase",color:t.ink}}>Net</span>
                <span style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:22,color:netSpentParts(dd,2).color,...numeral}}>{netSpentParts(dd,2).text}</span>
              </div>
            )}
          </React.Fragment>
        );
      }

      // ── DayDetail = a ruled ledger clipping ─────────────────────────────────────
      function DayDetail() {
        if (!selectedDay) return null;
        const dd  = viewDay(spendingMap[selectedDay]);
        const lvl = getDateLevel(selectedDay);
        const isZero = lvl === "zero";
        const [yr,mo,dy] = selectedDay.split("-");
        const label = `${MONTH_NAMES[parseInt(mo)-1]} ${parseInt(dy)}, ${yr}`;
        const v = verdictOf(lvl);
        const headParts = dd ? fmtAmt(basisAmount(dd), 2) : null;
        const totColor = lvl === "high" ? t.over : (headParts && headParts.gain ? t.credit : t.ink);
        const received = dd ? dd.received : 0;
        return (
          <div style={{background:t.card,borderRadius:6,padding:16,marginTop:14,border:`1px solid ${t.ruleBold}`,boxShadow:"0 6px 22px rgba(0,0,0,0.10)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",borderBottom:`1px solid ${t.ruleBold}`,paddingBottom:8,marginBottom:4}}>
              <div>
                <div style={{fontFamily:TOKENS.type.chic,fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:t.accent}}>{label}</div>
                {dd
                  ? <div style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:32,color:totColor,marginTop:2,...numeral}}>{headParts.text}</div>
                  : isZero
                    ? <div style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:28,color:t.ink,marginTop:2,...numeral}}>$0.00</div>
                    : <div style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:13,color:t.inkMuted,marginTop:4}}>No data for this day</div>
                }
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {v && <Stamp label={v.label} tone={v.tone}/>}
                <button onClick={()=>setSelectedDay(null)} style={{...iconBtn,width:28,height:28,background:t.btnBg,color:t.btnIcon}}><XIcon/></button>
              </div>
            </div>
            {dd && <Receipt dd={dd} merchantSize={13} amountSize={15}/>}
            {isZero && received === 0 && <div style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:13,color:t.inkMuted,padding:"10px 0 2px"}}>Nothing spent this day. ●</div>}
          </div>
        );
      }

      // ── Stamp (rotated overprint status mark) ───────────────────────────────────
      // tone: "over" (red outline) · "good" (lime fill, dark ink) · "neutral" (periwinkle outline)
      function Stamp({label, tone="neutral"}) {
        const s = tone === "over"
            ? { background:"transparent", color:t.over,        border:`2px solid ${t.over}` }
          : tone === "good"
            ? { background:t.accent2,     color:t.accent2Ink,  border:`2px solid ${t.accent2}` }
            : { background:"transparent", color:t.accent,      border:`2px solid ${t.accent}` };
        return (
          <span style={{display:"inline-block",transform:"rotate(-6deg)",...s,
            fontFamily:TOKENS.type.chic,fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"3px 9px",borderRadius:4}}>{label}</span>
        );
      }

      // ── Today view = the "lead story" ───────────────────────────────────────────
      function TodayView() {
        const dd    = viewDay(spendingMap[TODAY]);
        const lvl   = getDateLevel(TODAY);
        const isZero = lvl === "zero";
        const headline = dd ? basisAmount(dd) : (isZero ? 0 : null);
        const heroParts = headline !== null ? fmtAmt(headline, 0) : null;
        const verdict = verdictOf(lvl);

        // Month-to-date editorial figures (net cost in Net mode, gross in Spend)
        const mPrefix = TODAY.slice(0,7);
        let mTotal = 0, mDays = 0;
        RAW_DATA.forEach(d => { if (d.date.slice(0,7) === mPrefix) { const v = viewDay(d); mTotal += basisAmount(v); mDays++; } });
        const mAvg = mDays ? mTotal / mDays : 0;
        const received = dd ? dd.received : 0;
        const note = lvl==="absent" ? `Nothing spent on ${filterLabel} today.`
          : lvl==="gain" ? "Money in outpaced spending today."
          : isZero
          ? (received > 0 ? "No spending today, only money in." : "A clean day. Nothing left the account.")
          : lvl==="low" ? (filterLabel ? `A light ${filterLabel} day.` : "A light day, comfortably under goal.")
          : lvl==="high" ? (filterLabel ? `A heavy ${filterLabel} day.` : "Over goal today, a heavier day than most.")
          : "A steady, ordinary spending day.";

        const numColor = lvl==="high" ? t.over : (heroParts && heroParts.gain ? t.credit : t.ink);
        return (
          <div>
            {/* Lead */}
            <div style={{display:"grid",gridTemplateColumns:"1.35fr 1fr",gap:14,borderBottom:`1px solid ${t.ruleBold}`,paddingBottom:16,alignItems:"center"}}>
              <div style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:96,lineHeight:0.8,letterSpacing:"-0.02em",color:numColor,...numeral}}>
                {heroParts ? <span>{heroParts.text}<span style={{color:t.accent}}>.</span></span> : <span style={{fontSize:40,color:t.inkMuted}}>No data</span>}
              </div>
              <div>
                <div style={{fontFamily:TOKENS.type.chic,fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase",color:t.accent}}>{filterLabel ? `${filterLabel} today` : netMode ? "Net today" : "Spent today"}</div>
                <p style={{fontFamily:TOKENS.type.serif,fontSize:13,lineHeight:1.4,color:t.ink,marginTop:5}}>
                  {fmtAmt(mTotal,0).text} so far this month, {fmtAmt(mAvg,0).text}/day on average. {note}
                </p>
                {verdict && <div style={{marginTop:12}}><Stamp label={verdict.label} tone={verdict.tone}/></div>}
              </div>
            </div>

            {/* Money-in deck — only on days with credits, so spend-only days are unchanged */}
            {received > 0 && (
              <div style={{display:"flex",justifyContent:"flex-end",alignItems:"baseline",gap:10,padding:"11px 2px 0"}}>
                <span style={{fontFamily:TOKENS.type.chic,fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:t.inkMuted}}>Received</span>
                <span style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:22,color:t.credit,...numeral}}>+{fmtMoney(received)}</span>
                <span style={{fontFamily:TOKENS.type.chic,fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:t.inkMuted,marginLeft:8}}>Net</span>
                <span style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:22,color:netSpentParts(dd).color,...numeral}}>{netSpentParts(dd).text}</span>
              </div>
            )}

            {/* Today's ledger */}
            <div style={{fontFamily:TOKENS.type.chic,fontSize:12,letterSpacing:"0.1em",textTransform:"uppercase",margin:"16px 0 0",paddingBottom:5,borderBottom:`1px solid ${t.ruleBold}`,display:"flex",justifyContent:"space-between",color:t.ink}}>
              <span>Today's Ledger</span><span style={{color:t.accent}}>{DAY_NAMES_FULL[todayObj.getDay()]}</span>
            </div>
            {dd && <Receipt dd={dd} merchantSize={14} amountSize={16} showNet={false}/>}
            {isZero && received === 0 && <div style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:13,color:t.inkMuted,padding:"12px 2px"}}>No spending recorded today. ●</div>}
            {!dd && !isZero && <div style={{textAlign:"center",color:t.textFaint,padding:36,fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:14}}>No transaction data for today.</div>}
          </div>
        );
      }

      // ── Week view = the ruled weekly strip ──────────────────────────────────────
      function WeekView() {
        const dates = getWeekDates(weekOffset);
        let wTotal = 0;
        dates.forEach(ds => { const v = viewDay(spendingMap[ds]); if (v) wTotal += basisAmount(v); });
        const weekLabel = weekOffset===0 ? "This Week" : weekOffset===-1 ? "Last Week" : `${weekOffset>0?"+":""}${weekOffset} Weeks`;
        return (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"2px 0 0",paddingBottom:5,borderBottom:`1px solid ${t.ruleBold}`}}>
              <button onClick={()=>setWeekOffset(w=>w-1)} style={chevronBtn}><ChevLeft size={18}/></button>
              <span style={{fontFamily:TOKENS.type.chic,fontSize:12,letterSpacing:"0.1em",textTransform:"uppercase",color:t.ink}}>
                {filterLabel ? `${filterLabel} · ${weekLabel}` : weekLabel} <span style={{color:t.accent}}>· {fmtAmt(wTotal,0).text}</span>
              </span>
              <button onClick={()=>setWeekOffset(w=>w+1)} style={chevronBtn}><ChevRight size={18}/></button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(0,1fr))",borderLeft:`1px solid ${t.ruleHair}`,borderTop:`1px solid ${t.ruleHair}`}}>
              {dates.map((ds,i) => {
                const dd  = viewDay(spendingMap[ds]);
                const lvl = getDateLevel(ds);
                const isToday = ds === TODAY;
                const isSel   = selectedDay === ds;
                const isZero  = lvl === "zero";
                const isAbsent= lvl === "absent";
                const dayNum  = parseInt(ds.split("-")[2]);
                const ct = cellTone(lvl);
                const over = lvl === "high";
                const amt = dd ? fmtAmt(basisAmount(dd),0) : null;
                return (
                  <div key={ds} onClick={()=>toggleDay(ds)} style={{
                    background: ct.bg,
                    borderRight:`1px solid ${t.ruleHair}`, borderBottom:`1px solid ${t.ruleHair}`,
                    boxShadow: isToday ? `inset 0 0 0 2px ${t.accent}` : isSel ? `inset 0 0 0 1.5px ${t.accent}` : "none",
                    cursor:"pointer", textAlign:"center", padding:"9px 3px", minHeight:90,
                    display:"flex", flexDirection:"column", alignItems:"center",
                  }}>
                    <div style={{fontFamily:TOKENS.type.chic,fontSize:9,letterSpacing:"0.04em",color:over?"rgba(255,255,255,.8)":t.inkMuted}}>{DAY_NAMES[i].toUpperCase()}</div>
                    <div style={{fontFamily:TOKENS.type.serif,fontSize:20,color:isToday?(over?"#fff":t.accent):ct.num,lineHeight:1.1,marginTop:2,...numeral}}>{dayNum}</div>
                    {isAbsent
                      ? <div title={verdictOf(lvl)?.label} style={{fontSize:16,color:t.textFaint,marginTop:"auto",opacity:0.5}}>·</div>
                      : dd
                        ? <div style={{marginTop:"auto",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                            <span title={verdictOf(lvl)?.label} style={{fontSize:11,lineHeight:1,color:ct.num}}>{verdictOf(lvl)?.mark}</span>
                            <span style={{fontFamily:TOKENS.type.serif,fontSize:13,color:amt.gain?t.credit:ct.amt,...numeral}}>{amt.text}</span>
                          </div>
                        : isZero
                          ? <div style={{fontSize:12,color:over?"rgba(255,255,255,.7)":t.accent2Ink,marginTop:"auto"}}>●</div>
                          : <div style={{fontSize:12,color:t.textFaint,marginTop:"auto",opacity:0.4}}>—</div>
                    }
                    {dd && dd.received > 0 && <div title="money in" style={{fontFamily:TOKENS.type.chic,fontSize:12,fontWeight:700,lineHeight:1,marginTop:2,color:over?"rgba(255,255,255,.9)":t.credit}}>+</div>}
                  </div>
                );
              })}
            </div>
            {selectedDay && <DayDetail/>}
          </div>
        );
      }

      // ── Month view = the ledger table ───────────────────────────────────────────
      function MonthView() {
        const dim = getDIM(currentYear, currentMonth);
        const fd  = getFDOM(currentYear, currentMonth);
        let mTotal = 0, mOut = 0, mIn = 0;
        const cells = [];
        for(let i=0; i<fd; i++) cells.push(<div key={`e${i}`} style={{borderRight:`1px solid ${t.ruleHair}`,borderBottom:`1px solid ${t.ruleHair}`}}/>);
        for(let d=1; d<=dim; d++) {
          const ds  = formatDate(currentYear, currentMonth, d);
          const dd  = viewDay(spendingMap[ds]);
          const lvl = getDateLevel(ds);
          const isToday = ds === TODAY;
          const isSel   = selectedDay === ds;
          const isZero  = lvl === "zero";
          const isAbsent= lvl === "absent";
          const over    = lvl === "high";
          if (dd) { mTotal += basisAmount(dd); mOut += dd.total; mIn += dd.received; }
          const ct = cellTone(lvl);
          const amt = dd ? fmtAmt(basisAmount(dd),0,true) : null;
          cells.push(
            <div key={d} data-day={ds} onClick={()=>toggleDay(ds)} style={{
              background: ct.bg,
              borderRight:`1px solid ${t.ruleHair}`, borderBottom:`1px solid ${t.ruleHair}`,
              boxShadow: isToday ? `inset 0 0 0 2px ${t.accent}` : isSel ? `inset 0 0 0 1.5px ${t.accent}` : "none",
              padding:"5px 6px", cursor:"pointer", minHeight:54, display:"flex", flexDirection:"column",
            }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <span style={{fontFamily:TOKENS.type.serif,fontSize:12,color:isToday?(over?"#fff":t.accent):(lvl==="none"?t.textFaint:ct.num),...numeral}}>{d}</span>
                {dd && dd.received > 0 && <span title="money in" style={{fontFamily:TOKENS.type.chic,fontSize:11,fontWeight:700,lineHeight:1,color:over?"rgba(255,255,255,.9)":t.credit}}>+</span>}
              </div>
              {isAbsent
                ? <div title={verdictOf(lvl)?.label} style={{fontSize:13,color:t.textFaint,marginTop:"auto",opacity:0.5}}>·</div>
                : dd
                  ? <div style={{display:"flex",alignItems:"baseline",gap:3,marginTop:"auto"}}>
                      <span title={verdictOf(lvl)?.label} style={{fontSize:9,lineHeight:1,color:ct.num}}>{verdictOf(lvl)?.mark}</span>
                      <span style={{fontFamily:TOKENS.type.serif,fontSize:13,color:amt.gain?t.credit:ct.amt,lineHeight:1,...numeral}}>{amt.text}</span>
                    </div>
                  : isZero
                    ? <div style={{fontSize:11,color:over?"rgba(255,255,255,.7)":t.accent2Ink,marginTop:"auto"}}>●</div>
                    : <div style={{fontSize:11,color:t.textFaint,marginTop:"auto",opacity:0.4}}>—</div>
              }
            </div>
          );
        }
        return (
          <div>
            <div style={{fontFamily:TOKENS.type.chic,fontSize:12,letterSpacing:"0.1em",textTransform:"uppercase",margin:"2px 0 0",paddingBottom:5,borderBottom:`1px solid ${t.ruleBold}`,display:"flex",justifyContent:"space-between",alignItems:"flex-end",color:t.ink}}>
              <span>{filterLabel ? `${filterLabel} · The Month` : "The Month in Full"}</span>
              {netMode
                ? <div style={{textAlign:"right",textTransform:"none",letterSpacing:0}}>
                    <span style={{color:t.accent,...numeral}}>{fmtAmt(mTotal,0).text}</span>
                    {/* Net alone hides gross magnitude (a paycheck month nets near 0);
                        surface Out + In so the spend total is never buried. */}
                    <div style={{fontFamily:TOKENS.type.chic,fontSize:9,letterSpacing:"0.04em",color:t.inkMuted,marginTop:1}}>
                      Out <span style={{color:t.ink,...numeral}}>{fmtAmt(mOut,0,true).text}</span>
                      {" · In "}<span style={{color:t.credit,...numeral}}>+{fmtAmt(mIn,0,true).text}</span>
                    </div>
                  </div>
                : <span style={{color:t.accent,...numeral}}>{fmtAmt(mTotal,0).text}</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(0,1fr))",borderBottom:`1px solid ${t.ruleBold}`}}>
              {DAY_NAMES_SHORT.map((d,i) => (
                <div key={i} style={{textAlign:"center",fontFamily:TOKENS.type.chic,fontSize:9,letterSpacing:"0.04em",color:t.inkMuted,padding:"6px 0"}}>{d}</div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(0,1fr))",borderLeft:`1px solid ${t.ruleHair}`,borderTop:`1px solid ${t.ruleHair}`}}>{cells}</div>
            {selectedDay && <DayDetail/>}
          </div>
        );
      }

      // ── Year view = the annual report ───────────────────────────────────────────
      function YearView() {
        let yTotal = 0;
        MONTH_NAMES.forEach((_,mi) => {
          const dim = getDIM(currentYear, mi);
          for(let d=1; d<=dim; d++){ const v=viewDay(spendingMap[formatDate(currentYear,mi,d)]); if(v) yTotal += basisAmount(v); }
        });
        return (
          <div>
            <div style={{fontFamily:TOKENS.type.chic,fontSize:12,letterSpacing:"0.1em",textTransform:"uppercase",margin:"2px 0 0",paddingBottom:5,borderBottom:`1px solid ${t.ruleBold}`,display:"flex",justifyContent:"space-between",color:t.ink}}>
              <span>{filterLabel ? `${filterLabel} · ${currentYear}` : `The Annual Report · ${currentYear}`}</span><span style={{color:t.accent,...numeral}}>{fmtAmt(yTotal,0).text}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",borderLeft:`1px solid ${t.ruleHair}`,borderTop:`1px solid ${t.ruleHair}`}}>
              {MONTH_NAMES.map((mName,mi) => {
                const dim = getDIM(currentYear, mi);
                const fd  = getFDOM(currentYear, mi);
                let tot=0, recv=0, has=false;
                for(let d=1; d<=dim; d++) {
                  const ds = formatDate(currentYear, mi, d);
                  const v = viewDay(spendingMap[ds]);
                  if (v) { tot += basisAmount(v); recv += v.received; if (v.total > 0) has = true; }
                }
                const avgDaily = has ? tot/dim : 0;
                const yLow = filteredThresholds ? filteredThresholds.low  : lowThreshold;
                const yHigh= filteredThresholds ? filteredThresholds.high : highThreshold;
                const hi = Math.max(yHigh, yLow);
                const mLvl = !has ? "none" : avgDaily<=yLow ? "low" : avgDaily<=hi ? "medium" : "high";
                return (
                  <div key={mi} onClick={()=>{ setCurrentMonth(mi); setView("month"); }}
                    style={{borderRight:`1px solid ${t.ruleHair}`,borderBottom:`1px solid ${t.ruleHair}`,padding:"9px 9px 11px",cursor:"pointer",transition:"background 0.12s"}}
                    onMouseEnter={e=>e.currentTarget.style.background=t.accentTint}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
                      <span style={{fontFamily:TOKENS.type.chic,fontSize:12,letterSpacing:"0.04em",color:has?t.ink:t.textFaint}}>
                        {mName.slice(0,3).toUpperCase()}
                        {recv > 0 && <span title="money in" style={{color:t.credit,fontWeight:700,marginLeft:3}}>+</span>}
                      </span>
                      {has && <span style={{fontFamily:TOKENS.type.serif,fontSize:11,color:mLvl==="high"?t.over:t.inkMuted,...numeral}}>{fmtAmt(tot,0,true).text}</span>}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(0,1fr))",gap:2}}>
                      {Array(fd).fill(null).map((_,i) => <div key={`ep${i}`}/>)}
                      {Array(dim).fill(null).map((_,i) => {
                        const d  = i+1;
                        const ds = formatDate(currentYear, mi, d);
                        const lvl= getDateLevel(ds);
                        const dot = lvl==="high" ? t.over
                          : (lvl==="low"||lvl==="zero"||lvl==="gain") ? t.accent2
                          : lvl==="medium" ? t.inkMuted : t.ruleHair;
                        return (
                          <div key={d} style={{
                            width:5, height:5, borderRadius:"50%",
                            background: dot,
                            outline: ds===TODAY ? `1.5px solid ${t.accent}` : "none", outlineOffset:1,
                          }}/>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      // ── Category filter bar (Specimen chips) ────────────────────────────────────
      function FilterBar() {
        if (!debitCategories.length && !creditCategories.length) return null;
        const toggle = (c) => setActiveCats(prev => prev.includes(c) ? prev.filter(x => x !== c) : [...prev, c]);
        const chipBase = {
          flexShrink: 0, whiteSpace: "nowrap", cursor: "pointer",
          fontFamily: TOKENS.type.chic, fontSize: 11, fontWeight: 600, letterSpacing: "0.02em",
          padding: "5px 12px", borderRadius: 100,
          transition: "background 0.14s, color 0.14s, border-color 0.14s",
        };
        // Debit chips use the lime "active" fill; credit chips use the teal
        // "money-in" family (teal outline when off, teal fill when on).
        const chip = (on) => ({ ...chipBase,
          background: on ? t.accent2 : "transparent",
          color: on ? t.accent2Ink : t.inkMuted,
          border: `1px solid ${on ? t.accent2 : t.ruleHair}`,
        });
        const creditActiveText = mode === "light" ? t.paper : t.canvas;
        const creditChip = (on) => ({ ...chipBase,
          background: on ? t.credit : "transparent",
          color: on ? creditActiveText : t.credit,
          border: `1px solid ${t.credit}`,
        });
        const allOn = activeCats.length === 0;
        return (
          <div style={{marginBottom:14,position:"relative"}}>
            <div className="no-scrollbar" style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:5,scrollbarWidth:"none",WebkitOverflowScrolling:"touch"}}>
              <button onClick={()=>setActiveCats([])} aria-pressed={allOn} style={chip(allOn)}>All</button>
              {debitCategories.map(c => {
                const on = activeCats.includes(c);
                return <button key={c} onClick={()=>toggle(c)} aria-pressed={on} style={chip(on)}>{c}</button>;
              })}
              {creditCategories.length > 0 && debitCategories.length > 0 &&
                <span aria-hidden="true" style={{width:1,alignSelf:"stretch",background:t.ruleHair,flexShrink:0,margin:"3px 1px"}}/>}
              {creditCategories.map(c => {
                const on = activeCats.includes(c);
                return <button key={c} onClick={()=>toggle(c)} aria-pressed={on} style={creditChip(on)}>{`+ ${c}`}</button>;
              })}
            </div>
            {/* Right-edge fade hinting the chip row scrolls past the viewport */}
            <div aria-hidden="true" style={{position:"absolute",top:0,right:0,bottom:5,width:24,pointerEvents:"none",background:`linear-gradient(to right, transparent, ${t.canvas})`}}/>
            {!allOn && (
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6,fontFamily:TOKENS.type.chic,fontSize:10,letterSpacing:"0.08em",textTransform:"uppercase"}}>
                <span style={{background:t.accent2,color:t.accent2Ink,padding:"3px 9px",borderRadius:100,fontWeight:700}}>
                  Focus · {filterLabel}
                </span>
                {filteredThresholds && (
                  <span style={{color:t.inkMuted,textTransform:"none",letterSpacing:"0.02em"}}>
                    judged vs {fmtAmt(filteredThresholds.avg,0).text}/day avg
                  </span>
                )}
                <span style={{color:t.accent}}>· tap All to clear</span>
              </div>
            )}
          </div>
        );
      }

      // ── Masthead ────────────────────────────────────────────────────────────────
      const dateline = `${DAY_NAMES_FULL[todayObj.getDay()]}, ${MONTH_NAMES[todayObj.getMonth()]} ${todayObj.getDate()}, ${todayObj.getFullYear()}`;

      // ── Shell ─────────────────────────────────────────────────────────────────
      return (
        <div style={{maxWidth:520,margin:"0 auto",fontFamily:TOKENS.type.ui,background:t.canvas,backgroundImage:t.grain,backgroundSize:"3px 3px",minHeight:"100vh",padding:"22px 16px 48px",transition:"background 0.25s"}}>

          {/* Masthead */}
          <div style={{textAlign:"center",borderBottom:`3px double ${t.ruleBold}`,paddingBottom:10,marginBottom:14}}>
            <div style={{fontFamily:TOKENS.type.display,fontSize:38,lineHeight:0.9,letterSpacing:"-0.01em",textTransform:"uppercase",color:t.ink}}>The Daily Spend</div>
            <div style={{fontFamily:TOKENS.type.chic,fontSize:10,letterSpacing:"0.14em",textTransform:"uppercase",color:t.inkMuted,marginTop:8}}>{dateline}</div>
          </div>

          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            {/* Nav tabs */}
            <div style={{display:"flex",background:t.navBg,borderRadius:100,padding:3,gap:2}}>
              {["Today","Week","Month","Year"].map(v => (
                <button key={v} onClick={()=>setView(v.toLowerCase())} style={{
                  background: view===v.toLowerCase() ? t.navActive : "transparent",
                  color:      view===v.toLowerCase() ? t.navActiveText : t.navInactiveText,
                  border:"none",
                  borderRadius:100,
                  padding:"8px 14px",
                  fontWeight: view===v.toLowerCase() ? 600 : 500,
                  fontSize:13,
                  cursor:"pointer",
                  fontFamily:"inherit",
                  transition:"background 0.15s,color 0.15s",
                }}>{v}</button>
              ))}
            </div>
            {/* Settings (single button + anchored popover) */}
            <div style={{position:"relative"}}>
              <button onClick={()=>setShowSettings(s=>!s)} title="Settings" style={{
                ...iconBtn,
                background: showSettings ? t.navActive : t.btnBg,
                color:      showSettings ? "#ffffff"   : t.btnIcon,
                // Sit above the click-outside backdrop (z 40) so the gear itself toggles closed.
                position:"relative", zIndex:60,
                transition:"background 0.15s,color 0.15s",
              }}>
                <GearIcon/>
              </button>

              {showSettings && (
                <React.Fragment>
                  {/* click-outside backdrop */}
                  <div onClick={()=>setShowSettings(false)} style={{position:"fixed",inset:0,zIndex:40}}/>
                  {/* popover — styled as a press box */}
                  <div style={{
                    position:"absolute", top:46, right:0, width:288, zIndex:50,
                    background:t.card, borderRadius:6, padding:16,
                    border:`1px solid ${t.ruleBold}`,
                    boxShadow:"0 14px 40px rgba(0,0,0,0.20)",
                  }}>
                    {/* Appearance */}
                    <div style={{fontFamily:TOKENS.type.chic,fontSize:11,letterSpacing:"0.1em",color:t.accent,textTransform:"uppercase",marginBottom:8}}>Edition</div>
                    <div style={{display:"flex",background:segTrack,borderRadius:6,padding:3,gap:3,marginBottom:18}}>
                      {[{m:"light",label:"Day",icon:<SunIcon size={13}/>},{m:"dark",label:"Night",icon:<MoonIcon size={13}/>}].map(({m,label,icon}) => (
                        <button key={m} onClick={()=>setThemeMode(m)} style={{
                          flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6,
                          background: mode===m ? segActive : "transparent",
                          color:      mode===m ? t.ink : t.inkMuted,
                          border:"none", borderRadius:4, padding:"7px 10px",
                          fontWeight:600, fontSize:12, cursor:"pointer", fontFamily:TOKENS.type.ui,
                          boxShadow: mode===m ? "0 1px 3px rgba(0,0,0,0.16)" : "none",
                          transition:"background 0.15s,color 0.15s",
                        }}>{icon}{label}</button>
                      ))}
                    </div>

                    {/* Verdict basis */}
                    <div style={{fontFamily:TOKENS.type.chic,fontSize:11,letterSpacing:"0.1em",color:t.accent,textTransform:"uppercase",marginBottom:8}}>Verdict basis</div>
                    <div style={{display:"flex",background:segTrack,borderRadius:6,padding:3,gap:3,marginBottom:6}}>
                      {[{b:"spend",label:"Spend"},{b:"net",label:"Net"}].map(({b,label}) => (
                        <button key={b} onClick={()=>setBasis(b)} aria-pressed={verdictBasis===b} style={{
                          flex:1, background: verdictBasis===b ? segActive : "transparent",
                          color: verdictBasis===b ? t.ink : t.inkMuted,
                          border:"none", borderRadius:4, padding:"7px 10px",
                          fontWeight:600, fontSize:12, cursor:"pointer", fontFamily:TOKENS.type.ui,
                          boxShadow: verdictBasis===b ? "0 1px 3px rgba(0,0,0,0.16)" : "none",
                          transition:"background 0.15s,color 0.15s",
                        }}>{label}</button>
                      ))}
                    </div>
                    <div style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:12,color:t.inkMuted,marginBottom:18,lineHeight:1.35}}>
                      {netMode ? "Days are judged on net outflow (spend − money in)." : "Days are judged on gross spending."}
                    </div>

                    {/* Thresholds */}
                    <div style={{fontFamily:TOKENS.type.chic,fontSize:11,letterSpacing:"0.1em",color:t.accent,textTransform:"uppercase",marginBottom:10}}>Spending thresholds</div>
                    <div style={{marginBottom:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                        <label style={{fontSize:12,fontWeight:500,color:t.ink}}>Met goal under</label>
                        <span style={{fontFamily:TOKENS.type.serif,fontSize:13,color:t.ink,...numeral}}>under ${lowThreshold}</span>
                      </div>
                      <input type="range" min={0} max={500} step={5} value={lowThreshold}
                        onChange={e=>setLowThreshold(Number(e.target.value))}
                        style={{accentColor:t.accent}}/>
                    </div>
                    <div style={{marginBottom:16}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                        <label style={{fontSize:12,fontWeight:500,color:t.ink}}>Overspent over</label>
                        <span style={{fontFamily:TOKENS.type.serif,fontSize:13,color:t.ink,...numeral}}>over ${highThreshold}</span>
                      </div>
                      <input type="range" min={0} max={3000} step={25} value={highThreshold}
                        onChange={e=>setHighThreshold(Number(e.target.value))}
                        style={{accentColor:t.accent}}/>
                    </div>

                    {/* Verdict legend */}
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {[
                        {label:"Met goal ✓", bg:t.accent2,     fg:t.accent2Ink, bd:t.accent2},
                        {label:"On pace",    bg:"transparent", fg:t.inkMuted,   bd:t.ruleHair},
                        {label:"Overspent",  bg:t.over,        fg:"#fff",        bd:t.over},
                        ...(netMode ? [{label:"Net positive ✦", bg:t.goodTint, fg:t.ink, bd:t.credit}] : []),
                        {label:"No data",    bg:"transparent", fg:t.textFaint,  bd:t.ruleHair},
                      ].map(({label,bg,fg,bd}) => (
                        <div key={label} style={{
                          background:bg, color:fg, border:`1px solid ${bd}`,
                          fontFamily:TOKENS.type.chic, borderRadius:4, padding:"4px 10px", fontSize:11, fontWeight:600,
                        }}>{label}</div>
                      ))}
                    </div>
                  </div>
                </React.Fragment>
              )}
            </div>
          </div>

          {/* Category filters */}
          <FilterBar/>

          {/* Errata strip — refreshStatus-aware: distinguishes token-expired from a missed run */}
          {(() => {
            if (staleDismissed) return null;
            const authFailed = REFRESH_STATUS === "auth_failed";
            const ageHours = GENERATED_AT ? (Date.now() - new Date(GENERATED_AT).getTime()) / 36e5 : 0;
            const stale = GENERATED_AT && ageHours > 26;
            if (!authFailed && !stale) return null;
            const syncedLabel = GENERATED_AT ? new Date(GENERATED_AT).toLocaleDateString("en-US", {month:"short", day:"numeric", hour:"numeric", minute:"2-digit"}) : "unknown";
            const msg = authFailed
              ? <span><b>Token expired.</b> The Monarch token needs re-auth; see <code style={{fontSize:11,background:t.accentTint,borderRadius:3,padding:"1px 4px"}}>docs/solutions/monarch-auth-and-refresh.md</code></span>
              : <span><b>Refresh missed.</b> Last synced {syncedLabel}; check <code style={{fontSize:11,background:t.accentTint,borderRadius:3,padding:"1px 4px"}}>logs/refresh.log</code></span>;
            return (
              <div style={{background:t.accentTint,border:`1px solid ${t.accent}`,borderRadius:4,padding:"9px 12px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontFamily:TOKENS.type.chic,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:t.accent,whiteSpace:"nowrap"}}>Stop&nbsp;Press</span>
                <span style={{flex:1,fontSize:12,color:t.ink,fontWeight:400}}>{msg}</span>
                <button onClick={()=>setStaleDismissed(true)} style={{background:"none",border:"none",cursor:"pointer",color:t.inkMuted,padding:4,lineHeight:1,fontSize:16}}>✕</button>
              </div>
            );
          })()}

          {/* Dateline nav — month stepper (month view) or year stepper (year view) */}
          {view==="month" && (
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14,marginBottom:14,padding:"8px 4px",borderTop:`1px solid ${t.ruleHair}`,borderBottom:`1px solid ${t.ruleHair}`}}>
              <span style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:12,color:t.monthPrevNext,minWidth:34,textAlign:"right"}}>{MONTH_NAMES[(currentMonth+11)%12].slice(0,3)}</span>
              <button onClick={prevMonth} style={chevronBtn}><ChevLeft/></button>
              <span style={{fontFamily:TOKENS.type.chic,fontSize:16,color:t.ink,letterSpacing:"0.04em",minWidth:120,textAlign:"center"}}>{MONTH_NAMES[currentMonth].toUpperCase()} {currentYear}</span>
              <button onClick={nextMonth} style={chevronBtn}><ChevRight/></button>
              <span style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:12,color:t.monthPrevNext,minWidth:34}}>{MONTH_NAMES[(currentMonth+1)%12].slice(0,3)}</span>
            </div>
          )}
          {view==="year" && (
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,marginBottom:14,padding:"8px 4px",borderTop:`1px solid ${t.ruleHair}`,borderBottom:`1px solid ${t.ruleHair}`}}>
              <button onClick={()=>setCurrentYear(y=>y-1)} style={chevronBtn}><ChevLeft/></button>
              <span style={{fontFamily:TOKENS.type.serif,fontStyle:"italic",fontSize:22,color:t.ink,letterSpacing:"0.01em",...numeral}}>{currentYear}</span>
              <button onClick={()=>setCurrentYear(y=>y+1)} style={chevronBtn}><ChevRight/></button>
            </div>
          )}

          {view==="today" && <TodayView/>}
          {view==="week"  && <WeekView/>}
          {view==="month" && <MonthView/>}
          {view==="year"  && <YearView/>}
        </div>
      );
    }

    // ─── Error boundary ─────────────────────────────────────────────────────────
    // A render bug should show a graceful card, never a blank white page.
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      render() {
        if (this.state.error) {
          return (
            <div style={{fontFamily:"Inter,system-ui,sans-serif",padding:40,color:"#9f2f23",background:"#f7f7f5",minHeight:"100vh"}}>
              <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>Something went wrong rendering the page.</div>
              <div style={{fontSize:13,color:"#6b6a72"}}>{String(this.state.error && this.state.error.message || this.state.error)}</div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // ─── Data validation ──────────────────────────────────────────────────────────
    // Tolerant shape check: data must be an array of day records we can render.
    function validateSpending(j) {
      if (!j || typeof j !== "object") throw new Error("response is not an object");
      const data = j.data;
      if (!Array.isArray(data)) throw new Error("`data` is missing or not an array");
      const dateRe = /^\d{4}-\d{2}-\d{2}$/;
      data.forEach((d, i) => {
        if (!d || typeof d !== "object")        throw new Error(`day ${i} is not an object`);
        if (!dateRe.test(d.date))               throw new Error(`day ${i} has a bad date: ${d.date}`);
        if (typeof d.total !== "number")        throw new Error(`day ${i} (${d.date}) has a non-numeric total`);
        if (d.received !== undefined && typeof d.received !== "number")
          throw new Error(`day ${i} (${d.date}) has a non-numeric received`);
        if (d.net !== undefined && typeof d.net !== "number")
          throw new Error(`day ${i} (${d.date}) has a non-numeric net`);
        if (!Array.isArray(d.transactions))     throw new Error(`day ${i} (${d.date}) transactions is not an array`);
        d.transactions.forEach((tx, k) => {
          if (tx.type !== undefined && tx.type !== "debit" && tx.type !== "credit")
            throw new Error(`day ${i} (${d.date}) tx ${k} has a bad type: ${tx.type}`);
        });
      });
      return j;
    }

    // ─── Bootstrap ────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <div style={{fontFamily:"Inter,system-ui,sans-serif",padding:40,color:"#8a8a96",background:"#f7f7f5",minHeight:"100vh"}}>
        Loading…
      </div>
    );

    // Fetch with a small retry/backoff — a transient network blip shouldn't blank the app.
    async function loadSpending(attempts = 3) {
      let lastErr;
      for (let i = 0; i < attempts; i++) {
        try {
          const r = await fetch("data/spending.json", { cache: "no-store" });
          if (!r.ok) throw new Error("HTTP " + r.status);
          return validateSpending(await r.json());
        } catch (err) {
          lastErr = err;
          if (i < attempts - 1) await new Promise(res => setTimeout(res, 400 * (i + 1)));
        }
      }
      throw lastErr;
    }

    loadSpending()
      .then(j => {
        RAW_DATA       = j.data || [];
        TODAY          = j.today || (RAW_DATA.length ? RAW_DATA[RAW_DATA.length-1].date : new Date().toISOString().slice(0,10));
        GENERATED_AT   = j.generatedAt || "";
        REFRESH_STATUS = j.refreshStatus || "";
        root.render(<ErrorBoundary><SpendingCalendar/></ErrorBoundary>);
      })
      .catch(err => {
        root.render(
          <div style={{fontFamily:"Inter,system-ui,sans-serif",padding:40,color:"#9f2f23",background:"#f7f7f5",minHeight:"100vh"}}>
            Couldn't load spending data ({String(err && err.message || err)}). Check that data/spending.json exists and is valid.
          </div>
        );
      });
  </script>
</body>
</html>
