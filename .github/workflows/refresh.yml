name: Refresh Monarch data

on:
  # NOTE: the every-6h cron is disabled. Monarch's login endpoint blocks the
  # unofficial monarchmoney library (HTTP 405/429) from cloud IPs, so this CI
  # path cannot authenticate. Live data is now refreshed via the Monarch MCP
  # connector from a Claude session (see scripts/build_from_mcp.py). Kept here
  # for manual runs only, in case Monarch's library login is ever restored.
  workflow_dispatch: {}  # allow manual runs from the Actions tab

permissions:
  contents: write  # needed to commit the refreshed data file

concurrency:
  group: refresh-monarch
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Monarch transactions
        env:
          # Token-only auth: never hits Monarch's login endpoint (avoids 429).
          # NOTE: scripts/mint_token.py is a DEAD path (the library login 405s) —
          # this CI job cannot actually authenticate. Refresh runs from the Mac
          # (launchd) or a Claude session instead. See
          # docs/solutions/monarch-auth-and-refresh.md.
          MONARCH_TOKEN: ${{ secrets.MONARCH_TOKEN }}
        run: python scripts/fetch_monarch.py

      - name: Commit if data changed
        run: |
          git config user.name "monarch-bot"
          git config user.email "monarch-bot@users.noreply.github.com"
          if git diff --quiet -- data/spending.json; then
            echo "No changes in spending data."
          else
            git add data/spending.json
            git commit -m "chore: refresh spending data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
