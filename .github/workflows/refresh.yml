name: Refresh Monarch data

on:
  schedule:
    # Every 6 hours, on the hour (UTC).
    - cron: "0 */6 * * *"
  workflow_dispatch: {}  # allow manual runs from the Actions tab

permissions:
  contents: write  # needed to commit the refreshed data file

concurrency:
  group: refresh-monarch
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Monarch transactions
        env:
          # Token-only auth: never hits Monarch's login endpoint (avoids 429).
          # Mint the token locally with scripts/mint_token.py.
          MONARCH_TOKEN: ${{ secrets.MONARCH_TOKEN }}
        run: python scripts/fetch_monarch.py

      - name: Commit if data changed
        run: |
          git config user.name "monarch-bot"
          git config user.email "monarch-bot@users.noreply.github.com"
          if git diff --quiet -- data/spending.json; then
            echo "No changes in spending data."
          else
            git add data/spending.json
            git commit -m "chore: refresh spending data ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
